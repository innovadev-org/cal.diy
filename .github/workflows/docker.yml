name: Build and push Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/**"
      - "!.github/workflows/docker.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. 'latest' for main, 'wompi-bold-qa' for feature builds). Always also tagged with the commit SHA."
        required: true
        default: "latest"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="latest"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using image tag: $TAG"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/innovadev-org/cal:${{ steps.tag.outputs.image_tag }}
            ghcr.io/innovadev-org/cal:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal.innovadev.com.co
          cache-from: type=registry,ref=ghcr.io/innovadev-org/cal:buildcache
          cache-to: type=registry,ref=ghcr.io/innovadev-org/cal:buildcache,mode=max
